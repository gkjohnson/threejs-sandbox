<!DOCTYPE html>
<html lang="en">
	<head>
		<title>threejs webgpu - postprocessing - binned cube points</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<style>
			body {
				background-color: #000000;
				margin: 0px;
				padding: 0;
				overflow: hidden;
				font-family: Monospace;
				font-size: 13px;
				text-align: center;
				color: #fff;
			}

			a {
				color:#80CBC4;
			}

			#info {
				position: absolute;
				padding-top: 10px;
				width: 100%;
			}
		</style>
	</head>
	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.js",
				"three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.webgpu.js",
				"three/tsl": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.tsl.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
			}
		}
	</script>
	<body>

		<div id="info">
			<a href="http://threejs.org" target="_blank" rel="noopener">three.js</a> - Binned Cube Points <a href="http://gkjohnson.github.io" target="_blank" rel="noopener">Garrett Johnson</a>
			</br>
			Bin the point positions and render them as cubes.
		</div>

		<script type="module">

			import * as THREE from 'three';
			import { Fn, instancedArray, instanceIndex, uniform, positionLocal } from 'three/tsl';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			import Stats from 'three/addons/libs/stats.module.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

			// globals
			var stats;
			var params = {
				scale: 1.0,
				showPoints: false,
				offset: new THREE.Vector3()
			};
			var camera, scene, renderer, controls;
			var points, instanceMesh, instanceCount, pointsArr;
			var instancesNeedUpdate = true;
			var computeBins;

			// TSL uniforms shared by the compute kernel and the cube material.
			// uniform() keeps a live reference to params.offset, so the GUI edits it in place.
			const scaleUniform = uniform( params.scale );
			const offsetUniform = uniform( params.offset );

			init();

			function init() {

				// initialize renderer, scene, camera
				camera = new THREE.PerspectiveCamera( 40, window.innerWidth / window.innerHeight, 1, 2000 );
				camera.position.set( 0.0, 5, 5 * 3.5 );

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x263238 );

				renderer = new THREE.WebGPURenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				document.body.appendChild( renderer.domElement );


				const numPoints = 10000;
				const positionBufferSize = numPoints * 3;
				pointsArr = new Float32Array(positionBufferSize);
				var tempVec = new THREE.Vector3();
				for (var i = 0; i < positionBufferSize; i += 3) {

					tempVec.x = Math.random() - 0.5;
					tempVec.y = Math.random() - 0.5;
					tempVec.z = Math.random() - 0.5;
					tempVec.multiplyScalar(30);

					pointsArr[i + 0] = tempVec.x;
					pointsArr[i + 1] = tempVec.y;
					pointsArr[i + 2] = tempVec.z;

				}

				var pointsGeometry = new THREE.BufferGeometry();
				pointsGeometry.setAttribute('position', new THREE.BufferAttribute(pointsArr, 3, false));

				points = new THREE.Points(pointsGeometry, new THREE.PointsMaterial());
				scene.add(points);

				var cubeGeometry = new THREE.BoxGeometry();

				instanceCount = pointsArr.length / 3;

				const pointsBuffer = instancedArray( pointsArr, 'vec3' );
				const binnedBuffer = instancedArray( instanceCount, 'vec3' );

				computeBins = Fn( () => {

					const point = pointsBuffer.element( instanceIndex );

					const binned = point
						.add( offsetUniform )
						.div( scaleUniform )
						.floor()
						.mul( scaleUniform )
						.add( scaleUniform.mul( 0.5 ) )
						.sub( offsetUniform );

					binnedBuffer.element( instanceIndex ).assign( binned );

				} )().compute( instanceCount );

				var instanceMat = new THREE.MeshStandardNodeMaterial();
				instanceMat.positionNode = positionLocal.mul( scaleUniform ).add( binnedBuffer.toAttribute() );

				instanceMesh = new THREE.InstancedMesh( cubeGeometry, instanceMat, instanceCount );
				instanceMesh.frustumCulled = false;
				scene.add( instanceMesh );

				var dirLight = new THREE.DirectionalLight( 0xffffff, Math.PI );
				dirLight.position.set(1, 2, 3);
				scene.add(dirLight);

				var ambientLight = new THREE.AmbientLight(0xffffff );
				scene.add(ambientLight);

				controls = new OrbitControls( camera, renderer.domElement );
				controls.minDistance = 5;
				controls.maxDistance = 200;

				window.addEventListener( 'resize', onWindowResize, false );

				// lil-gui
				var gui = new GUI();
				gui.width = 300;

				gui.add(params, 'scale').min(0.25).max(3).onChange( v => {

					scaleUniform.value = v;
					instancesNeedUpdate = true;

				} );
				gui.add(params, 'showPoints');

				var folder = gui.addFolder('offset');
				folder.add(params.offset, 'x').min(-3).max(3).step(0.01).onChange( () => instancesNeedUpdate = true );
				folder.add(params.offset, 'y').min(-3).max(3).step(0.01).onChange( () => instancesNeedUpdate = true );
				folder.add(params.offset, 'z').min(-3).max(3).step(0.01).onChange( () => instancesNeedUpdate = true );
				folder.open();
				gui.open();

				renderer.setAnimationLoop( render );

			}

			function onWindowResize() {

				var width = window.innerWidth;
				var height = window.innerHeight;

				camera.aspect = width / height;
				camera.updateProjectionMatrix();

				renderer.setSize( width, height );

			}

			function render() {

				if ( instancesNeedUpdate ) {

					// run binning on GPU
					renderer.compute( computeBins );
					instancesNeedUpdate = false;

				}

				instanceMesh.visible = !params.showPoints;
				points.visible = params.showPoints;
				renderer.render(scene, camera);

			}

		</script>

	</body>

</html>
