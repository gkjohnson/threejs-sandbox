<!DOCTYPE html>
<html lang="en">
	<head>
		<title>threejs webgl - postprocessing - binned cube points</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<style>
			body {
				background-color: #000000;
				margin: 0px;
				padding: 0;
				overflow: hidden;
				font-family: Monospace;
				font-size: 13px;
				text-align: center;
				color: #fff;
			}

			a {
				color:#80CBC4;
			}

			#info {
				position: absolute;
				padding-top: 10px;
				width: 100%;
			}
		</style>
	</head>
	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
			}
		}
	</script>
	<body>

		<div id="info">
			<a href="http://threejs.org" target="_blank" rel="noopener">three.js</a> - Binned Cube Points <a href="http://gkjohnson.github.io" target="_blank" rel="noopener">Garrett Johnson</a>
			</br>
			Bin the point positions and render them as cubes.
		</div>

		<script type="module">

			import * as THREE from 'three';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			import Stats from 'three/addons/libs/stats.module.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

			// globals
			var stats;
			var params = {
				scale: 1.0,
				showPoints: false,
				offset: new THREE.Vector3()
			};
			var camera, scene, renderer, controls;
			var points, instanceMesh, instanceCount, pointsArr;
			var instancesNeedUpdate = true;

			// reused scratch objects for building the per-instance matrices
			const tempObject = new THREE.Object3D();
			const tempBin = new THREE.Vector3();

			console.log('test')

			init();
			animate();

			function init() {

				// initialize renderer, scene, camera
				camera = new THREE.PerspectiveCamera( 40, window.innerWidth / window.innerHeight, 1, 2000 );
				camera.position.set( 0.0, 5, 5 * 3.5 );

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x263238 );

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				document.body.appendChild( renderer.domElement );

				const numPoints = 1000;
				const positionBufferSize = 3 * numPoints;
				pointsArr = new Float32Array(positionBufferSize);

				var tempVec = new THREE.Vector3();
				for (var i = 0; i < positionBufferSize; i += 3) {

					tempVec.x = Math.random() - 0.5;
					tempVec.y = Math.random() - 0.5;
					tempVec.z = Math.random() - 0.5;
					tempVec.multiplyScalar(30);

					pointsArr[i + 0] = tempVec.x;
					pointsArr[i + 1] = tempVec.y;
					pointsArr[i + 2] = tempVec.z;

				}

				var pointsGeometry = new THREE.BufferGeometry();
				pointsGeometry.setAttribute('position', new THREE.BufferAttribute(pointsArr, 3, false));

				points = new THREE.Points(pointsGeometry, new THREE.PointsMaterial());
				scene.add(points);

				var cubeGeometry = new THREE.BoxGeometry();
				var instanceMat = new THREE.MeshStandardMaterial();

				instanceCount = pointsArr.length / 3;
				instanceMesh = new THREE.InstancedMesh( cubeGeometry, instanceMat, instanceCount );
				scene.add( instanceMesh );

				var dirLight = new THREE.DirectionalLight( 0xffffff, Math.PI );
				dirLight.position.set(1, 2, 3);
				scene.add(dirLight);

				var ambientLight = new THREE.AmbientLight(0xffffff);
				scene.add(ambientLight);

				// camera controls
				controls = new OrbitControls( camera, renderer.domElement );
				controls.minDistance = 5;
				controls.maxDistance = 200;

				window.addEventListener( 'resize', onWindowResize, false );

				// lil-gui
				var gui = new GUI();
				gui.width = 300;

				gui.add(params, 'scale').min(0.25).max(3).onChange( () => instancesNeedUpdate = true );
				gui.add(params, 'showPoints');

				var folder = gui.addFolder('offset');
				folder.add(params.offset, 'x').min(-3).max(3).step(0.01).onChange( () => instancesNeedUpdate = true );
				folder.add(params.offset, 'y').min(-3).max(3).step(0.01).onChange( () => instancesNeedUpdate = true );
				folder.add(params.offset, 'z').min(-3).max(3).step(0.01).onChange( () => instancesNeedUpdate = true );
				folder.open();
				gui.open();

			}

			function onWindowResize() {

				var width = window.innerWidth;
				var height = window.innerHeight;

				camera.aspect = width / height;
				camera.updateProjectionMatrix();

				renderer.setSize( width, height );

			}

			function animate() {

				requestAnimationFrame( animate );
				render();

			}

			function updateInstances() {

				var scale = params.scale;
				for ( var i = 0; i < instanceCount; i ++ ) {

					tempBin.set(
						pointsArr[ i * 3 + 0 ],
						pointsArr[ i * 3 + 1 ],
						pointsArr[ i * 3 + 2 ]
					);

					// Bin the point into a grid cell of size `scale` and center the cube in it.
					// Mirrors the per-vertex math the old custom shader performed.
					tempBin.add( params.offset );
					tempBin.divideScalar( scale );
					tempBin.floor();
					tempBin.multiplyScalar( scale );
					tempBin.addScalar( scale * 0.5 );
					tempBin.sub( params.offset );

					tempObject.position.copy( tempBin );
					tempObject.scale.setScalar( scale );
					tempObject.updateMatrix();
					instanceMesh.setMatrixAt( i, tempObject.matrix );

				}

				instanceMesh.instanceMatrix.needsUpdate = true;

			}

			function render() {

				if ( instancesNeedUpdate ) {

					updateInstances();
					instancesNeedUpdate = false;

				}

				instanceMesh.visible = !params.showPoints;
				points.visible = params.showPoints;
				renderer.render(scene, camera);

			}

		</script>

	</body>

</html>
